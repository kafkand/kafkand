<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum - Kafkand.net</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="museum.css">
</head>
<body>

    <!-- SITE LOGO (top-left fixed) -->
    <div class="museum-logo-wrapper">
        <a href="index.html" class="site-logo">
            <img src="images/window.jpg" alt="Kafkand Logo">
        </a>
    </div>

    <!-- BANNER -->
    <div class="museum-banner-wrapper">
        <img src="images/placeholder-banner.jpg" alt="Museum Banner" class="museum-banner">
    </div>

    <!-- MUSEUM CONTENT -->
    <div class="museum-wrapper">
        <h1 class="decorative">Museum Playlist</h1>
        <iframe 
            data-testid="embed-iframe"
            src="https://open.spotify.com/embed/playlist/0FvhO91kDONgqbZL0119oO?utm_source=generator" 
            frameborder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
